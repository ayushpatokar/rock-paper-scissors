<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone, Paper, Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="head"><h2>Rock Paper Scissors</h2></div>

    <div class="container">
        <div class="choices">
            <div class="choice" id="rock"><img src="images/rock.png" alt=""></div>
            <div class="choice" id="paper"><img src="images/paper.png" alt=""></div>
            <div class="choice" id="scissors"><img src="images/scissors.png" alt=""></div>
        </div>
        <div class="score">
            <div class="user-score">
                <p id="score1">0</p>
                <p>You</p>
            </div>
            <div class="comp-score">
                <p id="score2">0</p>
                <p>Comp</p>
            </div>
        </div>
        <div class="result">
            <p>Pick your choice</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
